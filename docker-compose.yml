version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: faims_postgres
    restart: always
    environment:
      POSTGRES_USER: faims_admin
      POSTGRES_PASSWORD: faims_secure_password_123
      POSTGRES_DB: faims_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: